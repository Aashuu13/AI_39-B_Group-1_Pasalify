
{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:75vh">
  <div style="width:100%;max-width:400px">
    <div class="text-center mb-4">
      <i class="bi bi-key-fill" style="font-size:2.5rem;color:var(--purple2)"></i>
      <h2 style="font-family:'Playfair Display',serif;margin-top:.5rem">Change Password</h2>
    </div>
    <div class="card">
      <div class="card-body" style="padding:2rem">
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">Current Password</label>
            <input type="password" class="form-control" name="old_password" required>
          </div>
          <div class="mb-3">
            <label class="form-label">New Password <small style="color:#E6EDF3">(min 8 chars)</small></label>
            <input type="password" class="form-control" name="new_password" required>
          </div>
          <button type="submit" class="btn btn-purple w-100" style="padding:.65rem">Update Password</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
