{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:85vh;padding:2rem 0">
  <div style="width:100%;max-width:480px">
    <div class="text-center mb-4">
      <i class="bi bi-bag-heart-fill" style="font-size:2.5rem;color:var(--purple2)"></i>
      <h2 style="font-family:'Playfair Display',serif;margin-top:.5rem">Create Account</h2>
      <p style="color:var(--muted);font-size:.9rem">Join Nepal's fastest growing marketplace</p>
    </div>
    <div class="card">
      <div class="card-body" style="padding:2rem">
        <form method="post">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" name="name" value="{{ name or '' }}" placeholder="Aarav Sharma" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" value="{{ email or '' }}" placeholder="you@example.com" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Phone</label>
            <div class="input-group">
              <span class="input-group-text">+977</span>
              <input type="text" class="form-control" name="phone" value="{{ phone or '' }}" placeholder="98XXXXXXXX">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Account Type</label>
            <div class="d-flex gap-3">
              <label style="flex:1;cursor:pointer">
                <input type="radio" name="role" value="customer" {% if (role or 'customer')=='customer' %}checked{% endif %} style="display:none" class="role-radio">
                <div class="role-card text-center" style="border:2px solid var(--border);border-radius:10px;padding:1rem;transition:.2s" data-role="customer">
                  <i class="bi bi-person-fill" style="font-size:1.8rem;color:var(--purple2)"></i>
                  <div style="font-weight:600;margin-top:.3rem">Customer</div>
                  <div style="font-size:.75rem;color:var(--muted)">Shop & discover</div>
                </div>
              </label>
              <label style="flex:1;cursor:pointer">
                <input type="radio" name="role" value="seller" {% if role=='seller' %}checked{% endif %} style="display:none" class="role-radio">
                <div class="role-card text-center" style="border:2px solid var(--border);border-radius:10px;padding:1rem;transition:.2s" data-role="seller">
                  <i class="bi bi-shop" style="font-size:1.8rem;color:var(--purple2)"></i>
                  <div style="font-weight:600;margin-top:.3rem">Seller</div>
                  <div style="font-size:.75rem;color:var(--muted)">Sell & grow</div>
                </div>
              </label>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Password <small style="color:var(--muted)">(min 8 chars)</small></label>
            <input type="password" class="form-control" name="password" id="pw" placeholder="••••••••" required>
            <div style="height:4px;background:var(--navy3);border-radius:2px;margin-top:.4rem">
              <div id="pw-strength" style="height:100%;border-radius:2px;transition:.3s;width:0%"></div>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control" name="confirm_password" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-purple w-100 mt-1" style="padding:.65rem">
            <i class="bi bi-person-plus me-1"></i> Create Account
          </button>
        </form>
        <div class="text-center mt-3" style="color:var(--muted);font-size:.88rem">
          Already have an account? <a href="{{ url_for('auth.login') }}" style="color:var(--purple2)">Sign in</a>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
document.querySelectorAll('.role-radio').forEach(r=>{
  r.addEventListener('change',()=>{
    document.querySelectorAll('.role-card').forEach(c=>c.style.borderColor='var(--border)');
    r.nextElementSibling.style.borderColor='var(--purple)';
  });
  if(r.checked) r.nextElementSibling.style.borderColor='var(--purple)';
});
document.getElementById('pw').addEventListener('input',function(){
  const l=this.value.length,el=document.getElementById('pw-strength');
  const pct=Math.min(l/12*100,100);
  el.style.width=pct+'%';
  el.style.background=l<6?'#EF4444':l<10?'#F59E0B':'#10B981';
});
</script>
{% endblock %}
