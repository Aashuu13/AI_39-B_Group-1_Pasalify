{% extends "base.html" %}
{% block title %}Setup Your Store{% endblock %}
{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height:80vh">
  <div style="width:100%;max-width:550px">
    <div class="text-center mb-4">
      <i class="bi bi-shop" style="font-size:2.5rem;color:var(--purple2)"></i>
      <h2 style="font-family:'Playfair Display',serif;margin-top:.5rem">Set Up Your Store</h2>
      <p style="color:var(--muted)">Your store will be reviewed and approved by our team</p>
    </div>
    <div class="card">
      <div class="card-body" style="padding:2rem">
        <form method="post" enctype="multipart/form-data">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label">Store Name <span style="color:#F87171">*</span></label>
            <input type="text" class="form-control" name="name" placeholder="e.g. Aarav Electronics" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Store Description</label>
            <textarea class="form-control" name="description" rows="3" placeholder="Tell customers what you sell..."></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Store Logo</label>
            <input type="file" class="form-control img-upload" name="logo" accept="image/*" data-preview="logo-prev">
            <img id="logo-prev" style="display:none;width:80px;height:80px;object-fit:cover;border-radius:50%;margin-top:.5rem;border:2px solid var(--purple)">
          </div>
          <div class="mb-3">
            <label class="form-label">Store Banner</label>
            <input type="file" class="form-control img-upload" name="banner" accept="image/*" data-preview="banner-prev">
            <img id="banner-prev" style="display:none;width:100%;height:100px;object-fit:cover;border-radius:8px;margin-top:.5rem">
          </div>
          <button type="submit" class="btn btn-purple w-100" style="padding:.65rem">
            <i class="bi bi-check-circle me-1"></i> Create Store
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
