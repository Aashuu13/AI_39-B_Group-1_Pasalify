{% extends "base.html" %}
{% block title %}My Profile{% endblock %}
{% block content %}
<div class="container mt-4 mb-5" style="max-width:700px">
  <h1 class="page-title">My Profile</h1>
  <div class="row g-3 mb-4">
    <div class="col-4 col-md-3">
      <div class="stat-card text-center">
        <div class="stat-value" style="font-size:1.4rem">{{ orders_count }}</div>
        <div class="stat-label">Orders</div>
      </div>
    </div>
    <div class="col-4 col-md-3">
      <div class="stat-card text-center">
        <div class="stat-value" style="font-size:1.4rem">{{ wish_count }}</div>
        <div class="stat-label">Wishlist</div>
      </div>
    </div>
    <div class="col-4 col-md-3">
      <div class="stat-card text-center">
        <div class="stat-value" style="font-size:1.4rem"><i class="bi bi-shield-check" style="color:var(--green)"></i></div>
        <div class="stat-label">Verified</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><i class="bi bi-person me-1"></i> Edit Profile</div>
    <div class="card-body">
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" name="name" value="{{ user.name }}" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Phone</label>
            <input type="text" class="form-control" name="phone" value="{{ user.phone or '' }}">
          </div>
          <div class="col-md-6">
            <label class="form-label">Email <small style="color:var(--muted)">(read-only)</small></label>
            <input type="email" class="form-control" value="{{ user.email }}" disabled style="opacity:.6">
          </div>
          <div class="col-md-6">
            <label class="form-label">City</label>
            <input type="text" class="form-control" name="city" value="{{ user.city or '' }}" placeholder="Kathmandu">
          </div>
          <div class="col-12">
            <label class="form-label">Address</label>
            <textarea class="form-control" name="address" rows="2">{{ user.address or '' }}</textarea>
          </div>
        </div>
        <div class="d-flex gap-2 mt-3">
          <div class="mb-3">
              <label class="form-label">Profile Photo</label>
              {% if user.avatar %}
              <div class="mb-2"><img src="{{ url_for('static', filename=user.avatar) }}" width="60" height="60" class="rounded-circle" style="object-fit:cover;border:2px solid var(--border)"></div>
              {% endif %}
              <input type="file" class="form-control" name="avatar" accept="image/*">
            </div>
            <button type="submit" class="btn btn-purple">Save Changes</button>
          <a href="{{ url_for('auth.change_password') }}" class="btn btn-outline-purple">Change Password</a>
        </div>
      </form>
    </div>
  </div>

  <div class="row g-2 mt-3">
    <div class="col-6"><a href="{{ url_for('customer.orders') }}" class="card text-center p-3" style="display:block;text-decoration:none"><i class="bi bi-box-seam" style="font-size:1.5rem;color:var(--purple2)"></i><div style="font-size:.85rem;margin-top:.3rem">My Orders</div></a></div>
    <div class="col-6"><a href="{{ url_for('customer.payment_history') }}" class="card text-center p-3" style="display:block;text-decoration:none"><i class="bi bi-credit-card" style="font-size:1.5rem;color:var(--purple2)"></i><div style="font-size:.85rem;margin-top:.3rem">Payment History</div></a></div>
  </div>
</div>
{% endblock %}
