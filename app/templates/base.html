{# 
base.html — global layout
Extended by every other template via {% extends "base.html" %}.
Provides: <head>/meta tags, the navbar, flash-message rendering,
footer, and shared <script> includes. Child templates fill in
the 'content' block (and 'title'/'extra_css'/'extra_js' if needed).
#}
<!DOCTYPE html>
<html lang="en">
<head>
<!-- Bootstrap 5 + Bootstrap Icons from CDN, then our own theme on top -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Pasalify{% endblock %} — Nepal's Multi-Vendor Marketplace</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/pasalify.css') }}?v=4">
{% block head %}{% endblock %}
</head>
<body>

<!-- Top navbar: logo, main nav links, search box, then a role-aware
     right-hand section (cart/wishlist/notifications for customers,
     a login/register pair for guests) -->
<nav class="navbar navbar-expand-lg">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="{{ url_for('customer.home') }}">
    <img src="{{ url_for('static', filename='uploads/images/logo.jpeg') }}" alt="Pasalify" style="height:40px">
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav me-auto ms-3 gap-1">
        <li class="nav-item"><a class="nav-link" href="{{ url_for('customer.home') }}"><i class="bi bi-house"></i> Home</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('customer.products') }}"><i class="bi bi-grid"></i> Products</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('customer.stores') }}"><i class="bi bi-shop"></i> Stores</a></li>
        <li class="nav-item"><a class="nav-link" href="{{ url_for('customer.support') }}"><i class="bi bi-headset"></i> Support</a></li>
      </ul>
      <form class="d-flex me-3" action="{{ url_for('customer.products') }}" method="get">
        <div class="input-group" style="width:280px">
          <input class="form-control form-control-sm" type="search" name="q" placeholder="Search products...">
          <button class="btn btn-purple btn-sm" type="submit"><i class="bi bi-search"></i></button>
        </div>
      </form>
      <ul class="navbar-nav gap-1 align-items-center">
        <!-- Logged in: cart/wishlist/chat/notifications (customers only)
             plus a name dropdown whose links depend on session.role -->
        {% if session.user_id %}
          {% if session.role == 'customer' %}
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('customer.cart') }}"><i class="bi bi-cart3"></i> Cart</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('customer.wishlist') }}"><i class="bi bi-heart"></i></a>
          </li>
          {% if session.role == 'customer' %}
  <li class="nav-item">
        <a class="nav-link" href="{{ url_for('customer.chats') }}"><i class="bi bi-chat"></i></a>
  </li>
{% endif %}
          <li class="nav-item">
            <a class="nav-link position-relative" href="{{ url_for('customer.notifications') }}">
              <i class="bi bi-bell"></i>
              <span id="notif-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill" style="background:var(--red);font-size:.6rem;display:none">0</span>
            </a>
          </li>
          {% endif %}
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle d-flex align-items-center gap-1" href="#" data-bs-toggle="dropdown">
              <i class="bi bi-person-circle"></i> {{ session.name.split()[0] }}
            </a>
            <ul class="dropdown-menu dropdown-menu-end" style="background:var(--navy2);border-color:var(--border)">
              {% if session.role == 'customer' %}
              <li><a class="dropdown-item" href="{{ url_for('customer.profile') }}" style="color:#E6EDF3"><i class="bi bi-person me-2"></i>My Profile</a></li>
              <li><a class="dropdown-item" href="{{ url_for('customer.orders') }}" style="color:#E6EDF3"><i class="bi bi-box me-2"></i>My Orders</a></li>
              <li><a class="dropdown-item" href="{{ url_for('customer.payment_history') }}" style="color:#E6EDF3"><i class="bi bi-credit-card me-2"></i>Payments</a></li>
              {% elif session.role == 'seller' %}
              <li><a class="dropdown-item" href="{{ url_for('seller.dashboard') }}" style="color:#E6EDF3"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
              {% elif session.role == 'admin' %}
              <li><a class="dropdown-item" href="{{ url_for('admin.dashboard') }}" style="color:#E6EDF3"><i class="bi bi-shield me-2"></i>Admin Panel</a></li>
              {% endif %}
              <li><hr class="dropdown-divider" style="border-color:var(--border)"></li>
              <li><a class="dropdown-item" href="{{ url_for('auth.change_password') }}" style="color:#E6EDF3"><i class="bi bi-key me-2"></i>Change Password</a></li>
              <li><a class="dropdown-item" href="{{ url_for('auth.logout') }}" style="color:#F87171"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
            </ul>
          </li>
        {% else %}
        <!-- Guest: just login/register -->
          <li class="nav-item"><a class="nav-link" href="{{ url_for('auth.login') }}">Login</a></li>
          <li class="nav-item"><a class="btn btn-purple btn-sm ms-1" href="{{ url_for('auth.register') }}">Register</a></li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 mt-2">
  <!-- Flash messages set by controllers via self._ok()/_err()/_warn()/_info() -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert" style="margin-bottom:.5rem">
      {{ msg }}
      <button type="button" class="btn-close" data-bs-dismiss="alert" style="filter:invert(1)"></button>
    </div>
    {% endfor %}
  {% endwith %}
</div>

<!-- Every page's actual content is injected here -->
{% block content %}{% endblock %}

<!-- Site-wide footer -->
<footer style="background:var(--navy2);border-top:1px solid var(--border);padding:2.5rem 0;margin-top:4rem">
  <div class="container">
    <div class="row g-4">
      <div class="col-md-4">
        <div class="d-flex align-items-center gap-2 mb-2">
          <i class="bi bi-bag-heart-fill" style="color:var(--purple2);font-size:1.4rem"></i>
          <span style="font-family:'Playfair Display',serif;font-size:1.2rem">Pasalify</span>
        </div>
        <p style="color:#E6EDF3;font-size:.85rem">Nepal's multi-vendor marketplace. Buy, sell, grow.</p>
      </div>
      <div class="col-md-2">
        <p style="color:#E6EDF3;font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;font-weight:700">Shop</p>
        <ul style="list-style:none;padding:0">
          <li><a href="{{ url_for('customer.products') }}" style="color:#E6EDF3;font-size:.85rem">All Products</a></li>
          <li><a href="{{ url_for('customer.stores') }}" style="color:#E6EDF3;font-size:.85rem">Browse Stores</a></li>
          <li><a href="#" style="color:#E6EDF3;font-size:.85rem">Categories</a></li>
        </ul>
      </div>
      <div class="col-md-2">
        <p style="color:#E6EDF3;font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;font-weight:700">Sell</p>
        <ul style="list-style:none;padding:0">
          <li><a href="{{ url_for('auth.register') }}" style="color:#E6EDF3;font-size:.85rem">Become a Seller</a></li>
          <li><a href="{{ url_for('customer.support') }}" style="color:#E6EDF3;font-size:.85rem">Seller Help</a></li>
        </ul>
      </div>
      <div class="col-md-4">
        <p style="color:#E6EDF3;font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;font-weight:700">Support</p>
        <p style="color:#E6EDF3;font-size:.85rem"><i class="bi bi-envelope me-1"></i> support@pasalify.com</p>
        <p style="color:#E6EDF3;font-size:.85rem"><i class="bi bi-telephone me-1"></i> +977-1-PASALIFY</p>
        <div class="d-flex gap-2 mt-2">
          <span style="background:var(--navy3);border:1px solid var(--border);padding:.3rem .6rem;border-radius:6px;font-size:.75rem;color:#E6EDF3">eSewa</span>
          <span style="background:var(--navy3);border:1px solid var(--border);padding:.3rem .6rem;border-radius:6px;font-size:.75rem;color:#E6EDF3">Khalti</span>
          <span style="background:var(--navy3);border:1px solid var(--border);padding:.3rem .6rem;border-radius:6px;font-size:.75rem;color:#E6EDF3">COD</span>
        </div>
      </div>
    </div>
    <hr style="border-color:var(--border);margin-top:2rem">
    <p style="color:#E6EDF3;font-size:.8rem;text-align:center">© 2026 Pasalify. </p>
  </div>
</footer>

<!-- Bootstrap's JS bundle, then our own pasalify.js, then any
     page-specific scripts a child template adds via the scripts block -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/pasalify.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
